name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    env:
      VSCODE_PAT: ${{ secrets.VSCODE_PAT }}
      OPEN_VSX_TOKEN: ${{ secrets.OPEN_VSX_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Package VSIX
        run: npm run package-vsix

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: bin/*.vsix
          prerelease: ${{ contains(github.ref_name, 'beta') }}

      - name: Publish to Visual Studio Marketplace
        if: ${{ env.VSCODE_PAT != '' && !contains(github.ref_name, 'beta') }}
        run: npx vsce publish -p "$VSCODE_PAT"

      - name: Publish to Open VSX
        if: ${{ env.OPEN_VSX_TOKEN != '' && !contains(github.ref_name, 'beta') }}
        run: npx ovsx publish -p "$OPEN_VSX_TOKEN"
